# vim: sw=2

name: Build CI

on:
  push:
  pull_request:
  release:
    types: [published]
  check_suite:
    types: [rerequested]

permissions:
  contents: read #  to fetch code (actions/checkout)

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        #runner: ["ubuntu-24.04", "ubuntu-24.04-arm"]
        #debian_version:  ["bookworm", "trixie", "sid"]
        runner: ["ubuntu-24.04"]
        debian_version:  ["trixie"]
        include:
          - runner_arch: x64
            runner: ubuntu-24.04
          - runner_arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/hdiethelm/linuxcnc-builder:${{ matrix.debian_version }}-${{ matrix.runner_arch }}-latest
    steps:
    - name: Dump GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: |
        echo Number of CPUs: $(nproc)
        echo "$GITHUB_CONTEXT"
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: false
        fetch-depth: 1
    - name: Test123
      run: |
        echo hallo